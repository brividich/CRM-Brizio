<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homepage Builder — Portale Novicrom</title>
<style>
:root {
  --primary: #1e3a5f;
  --accent: #f97316;
  --bg: #f0f2f7;
  --card: #ffffff;
  --border: #dde1ec;
  --text: #1a202c;
  --muted: #64748b;
  --success: #16a34a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Header ── */
.hb-header { background: var(--primary); color: #fff; padding: 11px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.hb-logo { font-size: 1rem; font-weight: 800; }
.hb-sub  { font-size: .73rem; opacity: .65; margin-top: 1px; }
.hb-actions { display: flex; gap: 8px; align-items: center; }
.btn { padding: 7px 15px; border: none; border-radius: 7px; font-size: .8rem; font-weight: 600; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 5px; }
.btn-accent   { background: var(--accent); color: #fff; }
.btn-accent:hover { background: #ea6c00; }
.btn-outline  { background: rgba(255,255,255,.12); color: #fff; border: 1px solid rgba(255,255,255,.28); }
.btn-outline:hover  { background: rgba(255,255,255,.22); }
.btn-outline.active { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.6); }
.btn-green { background: #16a34a; color: #fff; }
.btn-green:hover { background: #15803d; }
.btn-blue  { background: #2563eb; color: #fff; }
.btn-blue:hover  { background: #1d4ed8; }

/* ── Layout ── */
.hb-body { display: flex; flex: 1; overflow: hidden; }

/* ── LEFT panel ── */
.hb-left { width: 410px; flex-shrink: 0; overflow-y: auto; background: var(--card); border-right: 1px solid var(--border); }

/* Accordion */
.sec { border-bottom: 1px solid var(--border); }
.sec-head { display: flex; align-items: center; gap: 9px; padding: 10px 15px; cursor: pointer; user-select: none; background: #f8fafc; transition: background .12s; }
.sec-head:hover { background: #eff6ff; }
.sec-head.open  { background: #eff6ff; }
.sec-head.open .sec-lbl { color: #1d4ed8; font-weight: 700; }
.sec-icon  { font-size: .95rem; width: 22px; text-align: center; }
.sec-lbl   { flex: 1; font-size: .83rem; font-weight: 600; }
.sec-arrow { font-size: .65rem; color: var(--muted); transition: transform .2s; }
.sec-head.open .sec-arrow { transform: rotate(180deg); }
.sec-badge { font-size: .62rem; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
.badge-on  { background: #dcfce7; color: #15803d; }
.badge-off { background: #f1f5f9; color: #94a3b8; }
.sec-body      { display: none; padding: 13px 15px; }
.sec-body.open { display: block; }

/* Fields */
.f { margin-bottom: 11px; }
.f label { display: block; font-size: .71rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px; }
.f input[type=text], .f input[type=url], .f select, .f textarea { width: 100%; padding: 6px 9px; border: 1px solid var(--border); border-radius: 6px; font-size: .84rem; font-family: inherit; background: #fdfdff; transition: border-color .15s; }
.f input:focus, .f select:focus, .f textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.13); }
.f input[type=color] { padding: 2px 3px; height: 30px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); width: 100%; }
.f-row     { display: grid; gap: 8px; }
.f-row.two { grid-template-columns: 1fr 1fr; }
.hint { font-size: .71rem; color: #94a3b8; margin-bottom: 5px; }

/* Toggle */
.tog-row { display: flex; align-items: center; gap: 8px; margin-bottom: 11px; }
.tog-row label { font-size: .84rem; font-weight: 600; cursor: pointer; margin: 0; }
input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--primary); cursor: pointer; }

/* Repeatable items */
.items { display: flex; flex-direction: column; gap: 7px; margin-bottom: 9px; }
.item { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; }
.item-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.item-num { font-size: .71rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
.item-del { background: #fee2e2; color: #dc2626; border: none; border-radius: 5px; padding: 2px 8px; font-size: .71rem; cursor: pointer; }
.item-del:hover { background: #fecaca; }
.btn-add { width: 100%; padding: 7px; border-radius: 7px; font-size: .79rem; font-weight: 600; cursor: pointer; background: #f0fdf4; color: #16a34a; border: 1.5px dashed #86efac; }
.btn-add:hover { background: #dcfce7; }
.sec-sep { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
.info-box { background: #eff6ff; border-left: 3px solid #3b82f6; padding: 8px 10px; border-radius: 0 6px 6px 0; font-size: .76rem; color: #1e40af; margin-bottom: 11px; }

/* ── RIGHT panel ── */
.hb-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.preview-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 7px 14px; display: flex; align-items: center; gap: 8px; font-size: .78rem; color: var(--muted); flex-shrink: 0; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-r { background: #f87171; } .dot-y { background: #fbbf24; } .dot-g { background: #4ade80; }
.preview-url { flex: 1; background: #f1f5f9; border-radius: 5px; padding: 3px 10px; font-size: .74rem; color: #475569; }
.preview-area { flex: 1; overflow: hidden; padding: 12px; background: #e8edf5; }
.preview-area iframe { width: 100%; height: 100%; border: none; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.12); display: block; background: #fff; }
.output-area { flex: 1; display: none; flex-direction: column; overflow: hidden; }
.output-area.active { display: flex; }
.output-topbar { background: #1a2035; color: #94a3b8; padding: 9px 14px; display: flex; align-items: center; gap: 8px; font-size: .78rem; flex-shrink: 0; }
.output-fn { color: #e2e8f0; font-weight: 700; font-size: .82rem; flex: 1; }
.output-code { flex: 1; overflow: auto; background: #1a2035; color: #c8d3e8; font-family: 'Courier New', monospace; font-size: .74rem; line-height: 1.65; padding: 14px 16px; white-space: pre; margin: 0; }
</style>
</head>
<body>

<!-- Header -->
<header class="hb-header">
  <div>
    <div class="hb-logo">🏠 Homepage Builder — Portale Novicrom</div>
    <div class="hb-sub">Configura le sezioni · anteprima live · esporta template Django</div>
  </div>
  <div class="hb-actions">
    <button class="btn btn-outline active" id="btn-preview" onclick="showPreview()">👁 Anteprima</button>
    <button class="btn btn-outline" id="btn-output" onclick="showOutput()">⟨/⟩ Template Django</button>
    <button class="btn btn-accent" onclick="downloadTemplate()">⬇ Scarica .html</button>
  </div>
</header>

<!-- Body -->
<div class="hb-body">

  <!-- LEFT: form -->
  <div class="hb-left" id="formPanel"></div>

  <!-- RIGHT: preview / output -->
  <div class="hb-right">
    <div class="preview-bar">
      <span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span>
      <span class="preview-url">http://portale.cnovicrom.local/homepage/</span>
      <span style="font-size:.7rem;color:#94a3b8">Anteprima live — aggiornata ad ogni modifica</span>
    </div>
    <div class="preview-area" id="previewArea">
      <iframe id="previewFrame" title="Anteprima Homepage"></iframe>
    </div>
    <div class="output-area" id="outputArea">
      <div class="output-topbar">
        <span class="output-fn">📄 dashboard/templates/dashboard/pages/homepage.html</span>
        <button class="btn btn-blue" style="padding:4px 11px;font-size:.73rem" onclick="copyOutput()">Copia</button>
        <button class="btn btn-green" style="padding:4px 11px;font-size:.73rem" onclick="downloadTemplate()">⬇ Scarica</button>
      </div>
      <pre class="output-code" id="outputCode"></pre>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
const S = {

    { title: 'Registro Suggestion Corner', desc: 'Controlla il registro delle segnalazioni fornite dai dipendenti e segui lo stato di avanzamento.', img: '', link: '/suggestion-corner/', link_text: '', color: '#2d5282' },
    { title: 'Ambiente e Sicurezza UNI ISO 45001', desc: "Accedi alla sezione dello standard per la salute e la sicurezza sul lavoro di Costruzioni Novicrom.", img: '', link: '/sicurezza/', link_text: 'Clicca qui per accedere', color: '#15803d' },
  ],

    enabled: true,

      { label: "FLESSIBILITA'",           color: '#facc15', link: '/assenze/nuova/?tipo=flessibilita' },

  },
  helpdesk: {
    enabled: true,
    title: 'PORTALE IT HELPDESK',

    img: '',
    link: '/tickets/',
  },
  servizi: {
    enabled: true,
    title: 'Collegamenti ai servizi',
    items: [
      { icon: '👥', name: 'Personale presente in azienda',          link: '#' },
      { icon: '🚨', name: 'Squadra Emergency',                       link: '#' },
      { icon: '📒', name: 'Rubrica telefonica aziendale',            link: '#' },

      { icon: '🔧', name: 'Presura messa',                           link: '#' },

      { icon: '📋', name: 'Gestione NC',                             link: '#' },

  },
  risorse: {
    enabled: true,
    title: 'Risorse e formazione self-help',
    items: [
      { icon: '📄', name: 'Guida 20A portale Welfare AON',                        link: '#' },
      { icon: '🤖', name: "AI Literacy — comprendere l'IA in azienda",            link: '#' },
      { icon: '📊', name: 'Standard di IMS',                                      link: '#' },
      { icon: '📋', name: 'Formazione procedure CN 8865-6100-7201',               link: '#' },
      { icon: '📝', name: 'Formazione modello organizzativo 231',                 link: '#' },
      { icon: '📜', name: 'UNI PdR 125',                                          link: '#' },
      { icon: '🖥',  name: 'Guida portale presentazione MENGA',                   link: '#' },
      { icon: '🖨',  name: 'Guida copio centro NOVGAV',                           link: '#' },
      { icon: '✅', name: 'Autenticatori per accesso e dati aziendali',           link: '#' },
      { icon: '📅', name: 'Scadenziario',                                         link: '#' },
      { icon: '🔒', name: 'Sicurezza Email',                                      link: '#' },
      { icon: '📞', name: 'Manuale RI Conf',                                      link: '#' },
      { icon: '🔑', name: 'Come creare una password sicura',                      link: '#' },

    ],
  },
  notizie: {
    enabled: true,
    title: 'Comunicazioni importanti',
    link_all: '/notizie/',
  },
  chat: {
    enabled: true,
    buttons: [
      { label: "Chatta con Luca dell'Help Desk",   link: '#', color: '#1e3a5f' },
      { label: "Chatta con Simone dell'Help Desk", link: '#', color: '#2d5282' },
    ],
  },
  team: {
    enabled: true,
    title: 'Scopri il team IT',

      { name: 'Luca Bova',           role: 'Information Technology Assistant', photo: '' },

    ],

};

// ─────────────────────────────────────────────────────────────────────────────
// FORM BUILD
// ─────────────────────────────────────────────────────────────────────────────
const SECTIONS = [
  { id: 'hero',     icon: '🏆', lbl: '1 — Hero Cards (3 card in alto)',    fn: rHero,     noToggle: true },
  { id: 'assenze',  icon: '📋', lbl: '2 — Widget Assenze (sinistra)',       fn: rAssenze  },
  { id: 'helpdesk', icon: '🎫', lbl: '3 — Widget IT Helpdesk (destra)',     fn: rHelpdesk },
  { id: 'servizi',  icon: '🔗', lbl: '4 — Sezione Servizi',                 fn: rServizi  },
  { id: 'risorse',  icon: '📚', lbl: '5 — Risorse e Formazione',            fn: rRisorse  },
  { id: 'notizie',  icon: '📰', lbl: '6 — Comunicazioni Importanti',        fn: rNotizie  },
  { id: 'chat',     icon: '💬', lbl: '7 — Pulsanti Chat Help Desk',         fn: rChat     },
  { id: 'team',     icon: '👤', lbl: '8 — Team IT',                         fn: rTeam     },
];

function buildForm() {
  const panel = document.getElementById('formPanel');
  panel.innerHTML = '';
  SECTIONS.forEach((sec, i) => {
    const on = S[sec.id]?.enabled !== false;
    const badge = sec.noToggle ? '' : `<span class="sec-badge ${on ? 'badge-on' : 'badge-off'}" id="badge-${sec.id}">${on ? 'ON' : 'OFF'}</span>`;
    const div = document.createElement('div');
    div.className = 'sec'; div.id = 'sec-' + sec.id;
    div.innerHTML = `
      <div class="sec-head${i===0?' open':''}" onclick="toggleSec('${sec.id}')">
        <span class="sec-icon">${sec.icon}</span>
        <span class="sec-lbl">${sec.lbl}</span>
        ${badge}
        <span class="sec-arrow">▼</span>
      </div>
      <div class="sec-body${i===0?' open':''}" id="body-${sec.id}">${sec.fn()}</div>`;
    panel.appendChild(div);
  });
}

function toggleSec(id) {
  document.querySelector(`#sec-${id} .sec-head`).classList.toggle('open');
  document.getElementById('body-'+id).classList.toggle('open');
}

function rebuildSec(id) {
  const body = document.getElementById('body-'+id);
  const open = body.classList.contains('open');
  const sec = SECTIONS.find(s => s.id === id);
  body.innerHTML = sec.fn();
  if (open) body.classList.add('open');
}

function setEnabled(id, val) {
  S[id].enabled = val;
  const b = document.getElementById('badge-'+id);
  if (b) { b.textContent = val?'ON':'OFF'; b.className = 'sec-badge '+(val?'badge-on':'badge-off'); }
  refresh();
}

// ─────────────────────────────────────────────────────────────────────────────
// SECTION RENDERERS
// ─────────────────────────────────────────────────────────────────────────────
function rHero() {
  return `
    <div class="hint">Fino a 3 card con immagine (URL) o colore di sfondo solido.</div>
    <div class="items">${S.hero.map((c,i) => `
      <div class="item">
        <div class="item-hd"><span class="item-num">Card ${i+1}</span><button class="item-del" onclick="removeHero(${i})">Rimuovi</button></div>
        <div class="f"><label>Titolo</label><input type="text" value="${x(c.title)}" oninput="S.hero[${i}].title=this.value;refresh()"></div>
        <div class="f"><label>Descrizione</label><input type="text" value="${x(c.desc)}" oninput="S.hero[${i}].desc=this.value;refresh()"></div>
        <div class="f"><label>URL Immagine (opzionale)</label><input type="text" placeholder="https://... oppure /media/..." value="${x(c.img)}" oninput="S.hero[${i}].img=this.value;refresh()"></div>
        <div class="f-row two">
          <div class="f"><label>Colore sfondo</label><input type="color" value="${c.color}" oninput="S.hero[${i}].color=this.value;refresh()"></div>
          <div class="f"><label>Link URL</label><input type="text" value="${x(c.link)}" oninput="S.hero[${i}].link=this.value;refresh()"></div>
        </div>
        <div class="f"><label>Testo pulsante (vuoto = nessun pulsante)</label><input type="text" value="${x(c.link_text)}" oninput="S.hero[${i}].link_text=this.value;refresh()"></div>
      </div>`).join('')}
    </div>
    ${S.hero.length < 3 ? `<button class="btn-add" onclick="addHero()">+ Aggiungi card</button>` : ''}`;
}

function rAssenze() {
  const s = S.assenze;
  return `
    <div class="tog-row"><input type="checkbox" ${s.enabled?'checked':''} onchange="setEnabled('assenze',this.checked)"><label>Mostra sezione</label></div>
    <div class="f"><label>Titolo widget</label><input type="text" value="${x(s.title)}" oninput="S.assenze.title=this.value;refresh()"></div>
    <div class="f"><label>Link "Vedi tutte"</label><input type="text" value="${x(s.link_all)}" oninput="S.assenze.link_all=this.value;refresh()"></div>
    <hr class="sec-sep">
    <div class="hint">Bottoni tipo assenza:</div>
    <div class="items">${s.buttons.map((b,i) => `
      <div class="item">
        <div class="item-hd"><span class="item-num" style="color:${b.color}">● Bottone ${i+1}</span><button class="item-del" onclick="removeAssenzaBtn(${i})">Rimuovi</button></div>
        <div class="f-row two">
          <div class="f"><label>Etichetta</label><input type="text" value="${x(b.label)}" oninput="S.assenze.buttons[${i}].label=this.value;refresh()"></div>
          <div class="f"><label>Colore</label><input type="color" value="${b.color}" oninput="S.assenze.buttons[${i}].color=this.value;refresh()"></div>
        </div>
        <div class="f"><label>Link</label><input type="text" value="${x(b.link)}" oninput="S.assenze.buttons[${i}].link=this.value;refresh()"></div>
      </div>`).join('')}
    </div>
    <button class="btn-add" onclick="addAssenzaBtn()">+ Aggiungi bottone</button>
    <hr class="sec-sep">
    <div class="f-row two">
      <div class="f"><label>Label footer</label><input type="text" value="${x(s.footer_label)}" oninput="S.assenze.footer_label=this.value;refresh()"></div>
      <div class="f"><label>Link footer</label><input type="text" value="${x(s.footer_link)}" oninput="S.assenze.footer_link=this.value;refresh()"></div>
    </div>`;
}

function rHelpdesk() {
  const s = S.helpdesk;
  return `
    <div class="tog-row"><input type="checkbox" ${s.enabled?'checked':''} onchange="setEnabled('helpdesk',this.checked)"><label>Mostra sezione</label></div>
    <div class="f"><label>Titolo</label><input type="text" value="${x(s.title)}" oninput="S.helpdesk.title=this.value;refresh()"></div>
    <div class="f"><label>Sottotitolo / nome azienda</label><input type="text" value="${x(s.subtitle)}" oninput="S.helpdesk.subtitle=this.value;refresh()"></div>
    <div class="f"><label>URL immagine banner</label><input type="text" placeholder="https://... oppure /media/..." value="${x(s.img)}" oninput="S.helpdesk.img=this.value;refresh()"></div>
    <div class="f"><label>Link principale</label><input type="text" value="${x(s.link)}" oninput="S.helpdesk.link=this.value;refresh()"></div>`;
}

function rServizi() {
  const s = S.servizi;
  return `
    <div class="tog-row"><input type="checkbox" ${s.enabled?'checked':''} onchange="setEnabled('servizi',this.checked)"><label>Mostra sezione</label></div>
    <div class="f"><label>Titolo sezione</label><input type="text" value="${x(s.title)}" oninput="S.servizi.title=this.value;refresh()"></div>
    <hr class="sec-sep">
    <div class="items">${s.items.map((it,i) => `
      <div class="item">
        <div class="item-hd"><span class="item-num">${it.icon} Servizio ${i+1}</span><button class="item-del" onclick="removeServizio(${i})">Rimuovi</button></div>
        <div class="f-row two">
          <div class="f"><label>Emoji / Icona</label><input type="text" value="${x(it.icon)}" oninput="S.servizi.items[${i}].icon=this.value;refresh()"></div>
          <div class="f"><label>Link URL</label><input type="text" value="${x(it.link)}" oninput="S.servizi.items[${i}].link=this.value;refresh()"></div>
        </div>
        <div class="f"><label>Nome</label><input type="text" value="${x(it.name)}" oninput="S.servizi.items[${i}].name=this.value;refresh()"></div>
      </div>`).join('')}
    </div>
    <button class="btn-add" onclick="addServizio()">+ Aggiungi servizio</button>`;
}

function rRisorse() {
  const s = S.risorse;
  return `
    <div class="tog-row"><input type="checkbox" ${s.enabled?'checked':''} onchange="setEnabled('risorse',this.checked)"><label>Mostra sezione</label></div>
    <div class="f"><label>Titolo sezione</label><input type="text" value="${x(s.title)}" oninput="S.risorse.title=this.value;refresh()"></div>
    <hr class="sec-sep">
    <div class="items">${s.items.map((it,i) => `
      <div class="item">
        <div class="item-hd"><span class="item-num">${it.icon} Risorsa ${i+1}</span><button class="item-del" onclick="removeRisorsa(${i})">Rimuovi</button></div>
        <div class="f-row two">
          <div class="f"><label>Emoji / Icona</label><input type="text" value="${x(it.icon)}" oninput="S.risorse.items[${i}].icon=this.value;refresh()"></div>
          <div class="f"><label>Link URL</label><input type="text" value="${x(it.link)}" oninput="S.risorse.items[${i}].link=this.value;refresh()"></div>
        </div>
        <div class="f"><label>Nome</label><input type="text" value="${x(it.name)}" oninput="S.risorse.items[${i}].name=this.value;refresh()"></div>

// ─────────────────────────────────────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────────────────────────────────────
let _previewMode = true;

function showPreview() {
  _previewMode = true;
  document.getElementById('previewArea').style.display = '';
  document.getElementById('outputArea').classList.remove('active');
  document.getElementById('btn-preview').classList.add('active');
  document.getElementById('btn-output').classList.remove('active');
}

function showOutput() {
  _previewMode = false;
  document.getElementById('previewArea').style.display = 'none';
  document.getElementById('outputArea').classList.add('active');
  document.getElementById('btn-preview').classList.remove('active');
  document.getElementById('btn-output').classList.add('active');
  document.getElementById('outputCode').textContent = genDjango();
}

function copyOutput() {
  navigator.clipboard.writeText(document.getElementById('outputCode').textContent).then(() => {
    const btn = event.target; const orig = btn.textContent;
    btn.textContent = 'Copiato!'; btn.style.background = '#15803d';
    setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1500);
  });
}

function downloadTemplate() {
  const code = genDjango();
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(code);
  a.download = 'homepage.html';
  a.click();
}

// ─────────────────────────────────────────────────────────────────────────────
// REFRESH (debounced)
// ─────────────────────────────────────────────────────────────────────────────
let _rt = null;
function refresh() {
  clearTimeout(_rt);
  _rt = setTimeout(() => {
    if (_previewMode) {
      const f = document.getElementById('previewFrame');
      const d = f.contentDocument || f.contentWindow.document;
      d.open(); d.write(genPreview()); d.close();
    } else {
      document.getElementById('outputCode').textContent = genDjango();
    }
  }, 120);
}

// ─────────────────────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────────────────────
function x(s)  { return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function h(s)  { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
buildForm();
refresh();
</script>
